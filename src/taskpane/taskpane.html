<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PPT Command Bar</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <section id="command-bar-pane" style="padding: 10px 14px; background:#181818; border-top:1px solid #2B2B2B;">
        <div id="mode-chip" style="display:none; font-size:10px; letter-spacing:.5px; color:#C9F5E4; background:#1E332B; border:1px solid #2E4A3E; border-radius:3px; padding:2px 8px; margin-bottom:8px;">MODO COMANDO</div>
        <div id="command-bar-rest" role="button" style="display:flex; align-items:center; gap:8px; background:#232323; border:1px solid #333333; border-radius:4px; padding:8px 12px; cursor:text;">
            <span id="command-bar-prompt" style="color:#6A6A6A; font-family: 'Cascadia Code', Consolas, monospace; font-weight:700;">:</span>
            <input id="command-bar-input" type="text" placeholder="Enter" style="flex:1; background:transparent; border:none; outline:none; color:#E4E4E4; font-family:'Cascadia Code', Consolas, monospace; font-size:15px;" />
        </div>
    </section>
</body>

</html>
