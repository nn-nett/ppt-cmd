<!doctype html><html><head><meta charset="UTF-8"/><meta http-equiv="X-UA-Compatible" content="IE=Edge"/><meta name="viewport" content="width=device-width,initial-scale=1"><title>PPT Command Bar</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><link href="92a2231f6ac60027c363.css" rel="stylesheet"/><script defer="defer" src="polyfill.js"></script><script defer="defer" src="taskpane.js"></script></head><body><section id="command-bar-pane" style="padding:10px 14px;background:#181818;border-top:1px solid #2b2b2b"><div id="mode-chip" style="display:none;font-size:10px;letter-spacing:.5px;color:#c9f5e4;background:#1e332b;border:1px solid #2e4a3e;border-radius:3px;padding:2px 8px;margin-bottom:8px">MODO COMANDO</div><div id="command-bar-rest" role="button" style="display:flex;align-items:center;gap:8px;background:#232323;border:1px solid #333;border-radius:4px;padding:8px 12px;cursor:text"><span id="command-bar-prompt" style="color:#6a6a6a;font-family:'Cascadia Code',Consolas,monospace;font-weight:700">:</span><div style="position:relative;flex:1"><div id="command-bar-ghost" style="position:absolute;left:0;top:0;right:0;white-space:pre;pointer-events:none;font-family:'Cascadia Code',Consolas,monospace;font-size:15px;line-height:normal"><span id="ghost-typed" style="color:transparent"></span><span id="ghost-suffix" style="color:#6a6a6a"></span></div><input id="command-bar-input" placeholder="Enter" style="position:relative;width:100%;background:0 0;border:none;outline:0;color:#e4e4e4;font-family:'Cascadia Code',Consolas,monospace;font-size:15px;padding:0;margin:0"/></div></div><div id="command-result" class="command-result" style="display:none"><span id="command-result-text"></span><div id="command-result-hint" class="command-result-hint"></div></div></section></body></html>
